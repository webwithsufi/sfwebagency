<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 140 90" fill="none">
  <defs>
    <linearGradient id="logo-gradient-exact" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#2d328f;stop-opacity:1" />
      <stop offset="40%" style="stop-color:#38b6ff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#00d1ff;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Connections -->
  <g stroke="url(#logo-gradient-exact)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
    <!-- Left Section -->
    <line x1="20" y1="70" x2="35" y2="55" />
    <line x1="20" y1="70" x2="45" y2="75" />
    <line x1="35" y1="55" x2="45" y2="75" />
    <line x1="35" y1="55" x2="60" y2="45" />
    <line x1="45" y1="75" x2="60" y2="45" />
    <line x1="45" y1="75" x2="75" y2="65" />
    <line x1="60" y1="45" x2="75" y2="65" />
    
    <!-- Middle Bridge -->
    <line x1="60" y1="45" x2="85" y2="40" />
    <line x1="75" y1="65" x2="85" y2="40" />
    
    <!-- Right Arrow Section -->
    <line x1="85" y1="40" x2="100" y2="55" />
    <line x1="85" y1="40" x2="95" y2="25" />
    <line x1="100" y1="55" x2="95" y2="25" />
    <line x1="95" y1="25" x2="115" y2="35" />
    <line x1="100" y1="55" x2="115" y2="35" />
    <line x1="95" y1="25" x2="105" y2="10" />
    <line x1="115" y1="35" x2="105" y2="10" />
    
    <!-- Internal Arrow Supports -->
    <line x1="85" y1="40" x2="115" y2="35" />
  </g>
  
  <!-- Nodes -->
  <g fill="url(#logo-gradient-exact)">
    <circle cx="20" cy="70" r="4" />
    <circle cx="35" cy="55" r="4.5" />
    <circle cx="45" cy="75" r="4" />
    <circle cx="60" cy="45" r="5" />
    <circle cx="75" cy="65" r="4.5" />
    <circle cx="85" cy="40" r="5" />
    <circle cx="100" cy="55" r="4.5" />
    <circle cx="95" cy="25" r="5" />
    <circle cx="115" cy="35" r="5" />
    <circle cx="105" cy="10" r="5.5" />
  </g>
</svg>
